name: expensai_mobile
description: Frontend mobile do ExpensAI, gerenciador inteligente de despesas com Flutter.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3

  # Network
  dio: ^5.3.0

  # Storage
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0

  # Utilities
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.5

flutter:
  uses-material-design: true
